name: Build ArogyaDesk APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # Download gradle wrapper JAR
      - name: Setup Gradle Wrapper
        run: |
          mkdir -p android/gradle/wrapper
          curl -fsSL \
            "https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar" \
            -o android/gradle/wrapper/gradle-wrapper.jar
          echo "Wrapper JAR: $(du -h android/gradle/wrapper/gradle-wrapper.jar | cut -f1)"

      # Write gradlew (no quote issues)  
      - name: Create gradlew
        run: |
          cat > android/gradlew << 'GRADLEW'
          #!/usr/bin/env sh
          APP_HOME=$(cd "$(dirname "$0")" && pwd -P)
          exec java -Xmx2048m -Dfile.encoding=UTF-8 \
            -classpath "$APP_HOME/gradle/wrapper/gradle-wrapper.jar" \
            org.gradle.wrapper.GradleWrapperMain "$@"
          GRADLEW
          chmod +x android/gradlew

      # Decode keystore if secret exists
      - name: Setup Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            printf '%s' "$KEYSTORE_BASE64" | tr -d '[:space:]' | base64 -d > android/app/release.keystore
            if [ -s android/app/release.keystore ]; then
              echo "HAS_KEYSTORE=true"  >> $GITHUB_ENV
              echo "Keystore: OK"
            else
              echo "HAS_KEYSTORE=false" >> $GITHUB_ENV
              echo "Keystore: decode failed, debug only"
            fi
          else
            echo "HAS_KEYSTORE=false" >> $GITHUB_ENV
            echo "No keystore secret - debug build"
          fi

      # Always build debug
      - name: Build Debug APK
        working-directory: android
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.daemon=false \
            -Dorg.gradle.jvmargs="-Xmx2048m"

      # Build release only if keystore exists
      - name: Build Release APK + AAB
        if: env.HAS_KEYSTORE == 'true'
        working-directory: android
        run: |
          ./gradlew assembleRelease bundleRelease \
            --no-daemon \
            -Dorg.gradle.daemon=false
        env:
          KEYSTORE_PATH: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # Collect files
      - name: Collect APKs
        run: |
          mkdir -p dist
          D=$(date +%Y%m%d)
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             dist/ArogyaDesk-debug-$D.apk 2>/dev/null && echo "Debug APK OK" || true
          cp android/app/build/outputs/apk/release/app-release.apk \
             dist/ArogyaDesk-release-$D.apk 2>/dev/null && echo "Release APK OK" || true
          cp android/app/build/outputs/bundle/release/app-release.aab \
             dist/ArogyaDesk-$D.aab 2>/dev/null && echo "AAB OK" || true
          ls -lh dist/ || echo "No files in dist"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ArogyaDesk-DEBUG
          path: dist/ArogyaDesk-debug-*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: env.HAS_KEYSTORE == 'true'
        with:
          name: ArogyaDesk-RELEASE
          path: dist/ArogyaDesk-release-*.apk
          retention-days: 90

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        if: env.HAS_KEYSTORE == 'true'
        with:
          name: ArogyaDesk-PlayStore-AAB
          path: dist/ArogyaDesk-*.aab
          retention-days: 90
